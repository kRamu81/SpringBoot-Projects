<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickNotes</title>
    <style>
        /* ── Design tokens ── */
        :root {
            --bg:           #1a1a2e;
            --surface:      #16213e;
            --surface-deep: #0f3460;
            --accent:       #e94560;
            --accent-alt:   #00bcd4;
            --text:         #ffffff;
            --muted:        #b2b2b2;
            --note-bg:      #fff9e6;
            --note-border:  #ffcc00;
            --note-text:    #333333;
            --note-body:    #555555;
            --radius:       10px;
            --shadow:       0 4px 20px rgba(0,0,0,0.35);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
        }

        /* ── Header ── */
        header { text-align: center; }
        header h1 {
            font-size: 2.2rem;
            color: var(--accent);
            letter-spacing: 1px;
        }
        header p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

        /* ── Form card ── */
        .form-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 24px;
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: box-shadow 0.3s, border 0.3s;
            border: 2px solid transparent;
        }
        .form-card.editing {
            border-color: var(--accent-alt);
            box-shadow: 0 0 20px rgba(0,188,212,0.25);
        }

        input, textarea {
            background: var(--surface-deep);
            border: 1px solid var(--surface-deep);
            color: var(--text);
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.97rem;
            font-family: inherit;
            outline: none;
            resize: vertical;
            transition: border-color 0.25s;
        }
        input::placeholder, textarea::placeholder { color: var(--muted); }
        input:focus, textarea:focus { border-color: var(--accent); }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 13px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-primary:hover  { opacity: 0.88; transform: translateY(-1px); }
        .btn-primary.update { background: var(--accent-alt); }

        .btn-cancel {
            display: none;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--muted);
            padding: 9px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.08); }

        /* ── Notes grid ── */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .note-card {
            background: var(--note-bg);
            color: var(--note-text);
            border-top: 5px solid var(--note-border);
            border-radius: 4px;
            padding: 20px 18px 18px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .note-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.18);
        }

        .note-title {
            font-weight: 700;
            font-size: 1.1rem;
            padding-right: 52px;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .note-body {
            font-size: 0.9rem;
            line-height: 1.55;
            color: var(--note-body);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .card-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 4px;
        }
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 17px;
            padding: 3px 5px;
            border-radius: 4px;
            transition: opacity 0.2s, transform 0.15s;
            opacity: 0.55;
        }
        .icon-btn:hover     { opacity: 1; transform: scale(1.15); }
        .icon-btn.edit-btn  { color: #0056b3; }
        .icon-btn.del-btn   { color: #cc0000; }

        /* ── Empty / error states ── */
        .state-msg {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--muted);
            font-style: italic;
            padding: 40px 0;
        }
        .error-msg { color: var(--accent); font-style: normal; }

        /* ── Spinner ── */
        .spinner {
            width: 36px; height: 36px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>📝 QuickNotes</h1>
    <p>A simple, in-memory note-taking app powered by Spring Boot.</p>
</header>

<!-- ── Input form ── -->
<div class="form-card" id="formCard">
    <input  id="titleInput"   type="text" placeholder="Note title  (e.g. Grocery List)" />
    <textarea id="contentInput" rows="3"  placeholder="Note content (e.g. Milk, Eggs, Bread)"></textarea>
    <button class="btn-primary" id="submitBtn" onclick="handleSubmit()">+ Add Note</button>
    <button class="btn-cancel"  id="cancelBtn"  onclick="cancelEdit()">✕ Cancel Edit</button>
</div>

<!-- ── Notes display ── -->
<div class="notes-grid" id="notesGrid">
    <div class="spinner"></div>
</div>


<script>
"use strict";

/* ── API base URL ────────────────────────────────────────────────────────── */

function getApiBase() {
    const host     = window.location.hostname;
    const protocol = window.location.protocol;
    const dot      = host.indexOf('.');

    /* Running on CodeChef / hosted env  →  swap subdomain to *-backend */
    if (dot !== -1 && !host.startsWith('localhost') && host !== '127.0.0.1') {
        const sub  = host.substring(0, dot);
        const rest = host.substring(dot);
        return `${protocol}//${sub}-backend${rest}/api/notes`;
    }

    /* Local development */
    return 'http://localhost:8080/api/notes';
}

const API = getApiBase();
console.log('API endpoint:', API);

/* ── State ───────────────────────────────────────────────────────────────── */
let editingId = null;

/* ── Boot ────────────────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', loadNotes);

/* ── CRUD helpers ────────────────────────────────────────────────────────── */

async function loadNotes() {
    setGrid('<div class="spinner"></div>');
    try {
        const res   = await fetch(API);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const notes = await res.json();
        renderNotes(notes);
    } catch (err) {
        setGrid(`<p class="state-msg error-msg">
            <b>Could not connect to the backend.</b><br>
            Tried: <code>${API}</code><br>
            Make sure your Spring Boot server is running.
        </p>`);
        console.error(err);
    }
}

async function handleSubmit() {
    const title   = document.getElementById('titleInput').value.trim();
    const content = document.getElementById('contentInput').value.trim();

    if (!title || !content) {
        alert('Please fill in both the title and content fields.');
        return;
    }

    try {
        if (editingId !== null) {
            await fetch(`${API}/${editingId}`, {
                method:  'PUT',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ title, content })
            });
            cancelEdit();
        } else {
            await fetch(API, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ title, content })
            });
            clearForm();
        }
        loadNotes();
    } catch (err) {
        alert('Operation failed. Is the backend running?');
        console.error(err);
    }
}

async function deleteNote(id) {
    if (!confirm('Delete this note?')) return;
    try {
        await fetch(`${API}/${id}`, { method: 'DELETE' });
        if (editingId === id) cancelEdit();
        loadNotes();
    } catch (err) {
        alert('Delete failed.');
        console.error(err);
    }
}

/* ── Edit mode ───────────────────────────────────────────────────────────── */

function startEdit(id, title, content) {
    editingId = id;
    document.getElementById('titleInput').value   = title;
    document.getElementById('contentInput').value  = content;

    const btn = document.getElementById('submitBtn');
    btn.textContent = '💾 Update Note';
    btn.classList.add('update');

    document.getElementById('cancelBtn').style.display = 'block';
    document.getElementById('formCard').classList.add('editing');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
    editingId = null;
    clearForm();

    const btn = document.getElementById('submitBtn');
    btn.textContent = '+ Add Note';
    btn.classList.remove('update');

    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('formCard').classList.remove('editing');
}

/* ── Rendering ───────────────────────────────────────────────────────────── */

function renderNotes(notes) {
    if (!notes.length) {
        setGrid('<p class="state-msg">No notes yet – create one above!</p>');
        return;
    }

    const grid = document.getElementById('notesGrid');
    grid.innerHTML = '';

    notes.forEach(note => {
        const card = document.createElement('div');
        card.className = 'note-card';
        card.innerHTML = `
            <div class="card-actions">
                <button class="icon-btn edit-btn"
                        title="Edit"
                        onclick='startEdit(${note.id}, ${JSON.stringify(note.title)}, ${JSON.stringify(note.content)})'>
                    ✏️
                </button>
                <button class="icon-btn del-btn"
                        title="Delete"
                        onclick="deleteNote(${note.id})">
                    ×
                </button>
            </div>
            <div class="note-title">${esc(note.title)}</div>
            <div class="note-body">${esc(note.content)}</div>
        `;
        grid.appendChild(card);
    });
}

/* ── Utils ───────────────────────────────────────────────────────────────── */

function setGrid(html) {
    document.getElementById('notesGrid').innerHTML = html;
}

function clearForm() {
    document.getElementById('titleInput').value   = '';
    document.getElementById('contentInput').value  = '';
}

function esc(str) {
    if (!str) return '';
    return str
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;')
        .replace(/'/g,  '&#039;');
}
</script>
</body>
</html>
