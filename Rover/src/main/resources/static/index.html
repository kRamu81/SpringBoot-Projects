<!DOCTYPE html>
<html>
<head>
    <title>Mars Rover Navigator</title>
    <style>
        body {
            background-color: black;
            color: #00ffff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        #grid {
            width: 400px;
            height: 400px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            border: 2px solid #00ffff;
        }

        .cell {
            border: 1px solid #003333;
        }

        .rover {
            background-color: red;
        }

        input {
            padding: 8px;
            margin: 10px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        .status {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>MARS ROVER NAVIGATOR</h1>

<div id="grid"></div>

<div class="status">
    <p>Coordinates: <span id="coords">0, 0</span></p>
    <p>Direction: <span id="direction">N</span></p>
</div>

<input type="text" id="commands" placeholder="Enter Commands (e.g. FFRFF)">
<button onclick="sendCommands()">SEND</button>
<button onclick="resetRover()">RESET</button>

<script>
    const grid = document.getElementById("grid");

    // Create grid cells
    for (let i = 0; i < 100; i++) {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        grid.appendChild(cell);
    }

    function updateGrid(x, y) {
        document.querySelectorAll(".cell").forEach(cell => {
            cell.classList.remove("rover");
        });

        const index = (9 - y) * 10 + x;
        grid.children[index].classList.add("rover");
    }

    function updateStatus(data) {
        document.getElementById("coords").innerText = data.x + ", " + data.y;
        document.getElementById("direction").innerText = data.direction;
        updateGrid(data.x, data.y);
    }

    function sendCommands() {
        const commands = document.getElementById("commands").value;

        fetch("/api/move?commands=" + commands, {
            method: "POST"
        })
        .then(response => response.json())
        .then(data => {
            updateStatus(data);
        });
    }

    function resetRover() {
        fetch("/api/reset", {
            method: "POST"
        })
        .then(response => response.json())
        .then(data => {
            updateStatus(data);
        });
    }

    // Load initial status
    fetch("/api/status")
        .then(response => response.json())
        .then(data => {
            updateStatus(data);
        });
</script>

</body>
</html>
